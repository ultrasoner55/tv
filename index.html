<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web TV</title>
    <link rel="icon" type="image/png" href="favicon.svg">
    <link rel="shortcut icon" type="image/png" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<script>
    if (localStorage.getItem('tv-theme') === 'day') {
        document.body.classList.add('day');
    }
</script>
<div class="topbar">

    <!-- LOGO — ortalanmış, büyütülmüş -->
    <div class="logo" id="logoToTop" style="cursor:pointer; user-select:none; display:flex; align-items:center; justify-content:center;">
        <svg height="64" viewBox="0 -20 460 220" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#4A9EF5"/>
                    <stop offset="100%" stop-color="#1A6FD4"/>
                </linearGradient>
            </defs>
            <!-- TV ekranı -->
            <rect x="2" y="30" width="116" height="86" rx="10" fill="none" stroke="var(--text)" stroke-width="5"/>
            <!-- Ayak boyun -->
            <rect x="53" y="116" width="10" height="18" rx="3" fill="var(--text)"/>
            <!-- Ayak taban -->
            <rect x="32" y="132" width="52" height="7" rx="3.5" fill="var(--text)"/>
            <!-- Play üçgeni -->
            <polygon points="49,57 49,89 85,73" fill="url(#blueGrad)"/>
            <!-- Dikey ayraç -->
            <line x1="142" y1="20" x2="142" y2="145" class="logo-divider" stroke-width="2"/>
            <!-- "Web" yazısı -->
            <text x="158" y="112" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" letter-spacing="-2">
                <tspan fill="var(--text)">Web </tspan><tspan fill="url(#blueGrad)">TV</tspan>
            </text>
            <!-- "TV" yazısı -->
            
        </svg>
    </div>

    <div class="topbar-spacer"></div>

    <!-- Klavye Kısayolları Yardım Butonu -->
    <button id="kbHelpBtn" onclick="toggleKbHelp()" title="Klavye Kısayolları" style="background:none;border:none;cursor:pointer;color:var(--text);padding:6px 10px;border-radius:8px;font-size:20px;opacity:0.7;transition:opacity 0.2s;display:flex;align-items:center;margin-right:8px;" onmouseover="this.style.opacity=&apos;1&apos;" onmouseout="this.style.opacity=&apos;0.7&apos;">⌨️</button>

    <!-- Klavye Kısayolları Paneli -->
    <div id="kbHelpOverlay" onclick="toggleKbHelp()" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9997;"></div>
    <div id="kbHelpPanel" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 28px;z-index:9998;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:&apos;Inter&apos;,sans-serif;">
        <div style="font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text);">⌨️ Klavye Kısayolları</div>
        <table style="width:100%;border-collapse:collapse;font-size:14px;color:var(--text);">
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">Boşluk</kbd> / <kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">K</kbd></td><td style="padding:6px 8px;color:#888;">Oynat / Duraklat</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">→</kbd></td><td style="padding:6px 8px;color:#888;">10 saniye ileri</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">←</kbd></td><td style="padding:6px 8px;color:#888;">10 saniye geri</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">↑</kbd></td><td style="padding:6px 8px;color:#888;">Sesi artır</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">↓</kbd></td><td style="padding:6px 8px;color:#888;">Sesi azalt</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">M</kbd></td><td style="padding:6px 8px;color:#888;">Sesi kapat / aç</td></tr>
            <tr><td style="padding:6px 0;"><kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">F</kbd> / <kbd style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:12px;">Enter</kbd></td><td style="padding:6px 8px;color:#888;">Tam ekran aç/kapat</td></tr>
        </table>
        <div style="text-align:center;margin-top:16px;"><button onclick="toggleKbHelp()" style="background:#1A6FD4;color:#fff;border:none;border-radius:8px;padding:8px 22px;cursor:pointer;font-size:13px;font-weight:600;">Kapat</button></div>
    </div>

    <!-- Gece/Gündüz Toggle -->
    <div class="fancy-toggle" id="themeBtn" onclick="toggleTheme()">
        <div class="f-star" style="width:2px;height:2px;top:4px;left:30px;"></div>
        <div class="f-star" style="width:2px;height:2px;top:14px;left:32px;"></div>
        <div class="f-star" style="width:1.5px;height:1.5px;top:6px;left:45px;"></div>
        <svg class="f-cloud" style="top:3px;left:2px;width:11px;height:6px;" viewBox="0 0 11 6">
            <ellipse cx="5.5" cy="4.5" rx="4.5" ry="2" fill="white" opacity="0.9"/>
            <ellipse cx="3.5" cy="3.5" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>
            <ellipse cx="8" cy="3.5" rx="2" ry="2" fill="white" opacity="0.9"/>
        </svg>
        <svg class="f-cloud" style="top:14px;left:12px;width:10px;height:6px;" viewBox="0 0 10 6">
            <ellipse cx="5" cy="4.5" rx="4" ry="2" fill="white" opacity="0.75"/>
            <ellipse cx="3" cy="3" rx="2.5" ry="2" fill="white" opacity="0.75"/>
            <ellipse cx="7" cy="3" rx="2" ry="1.5" fill="white" opacity="0.75"/>
        </svg>
        <svg class="f-cloud" style="top:7px;left:20px;width:8px;height:5px;" viewBox="0 0 8 5">
            <ellipse cx="4" cy="3.5" rx="3.5" ry="1.8" fill="white" opacity="0.6"/>
            <ellipse cx="2.5" cy="2.5" rx="2" ry="1.8" fill="white" opacity="0.6"/>
            <ellipse cx="6" cy="2.5" rx="1.5" ry="1.3" fill="white" opacity="0.6"/>
        </svg>
        <div class="fancy-knob">
            <div class="sun-shape">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <line x1="9" y1="1" x2="9" y2="3.5" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="9" y1="14.5" x2="9" y2="17" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="1" y1="9" x2="3.5" y2="9" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="14.5" y1="9" x2="17" y2="9" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="3" y1="3" x2="4.8" y2="4.8" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="13.2" y1="13.2" x2="15" y2="15" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="3" y1="15" x2="4.8" y2="13.2" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="13.2" y1="4.8" x2="15" y2="3" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="9" cy="9" r="4" fill="#f5c842"/>
                </svg>
            </div>
            <div class="moon-shape">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <circle cx="9" cy="9" r="6.5" fill="#e8e8f0"/>
                    <circle cx="12" cy="7" r="5.8" fill="#1a1a2e"/>
                </svg>
            </div>
        </div>
    </div>
</div>

<div class="layout">
    <div class="sidebar">
        <!-- M3U EKLE -->
        <div class="m3u-section">
            <div class="m3u-header" id="m3uToggle">
                <span>M3U Ekle</span>
                <svg id="m3uArrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="m3u-body" id="m3uBody">
                <div class="m3u-label">URL İLE EKLE</div>
                <div class="m3u-row">
                    <input type="text" id="m3uUrl" class="m3u-input" placeholder="https://example.com/list.m3u"/>
                    <button class="m3u-btn">Yükle</button>
                </div>
                <div class="m3u-label" style="margin-top:10px;">DOSYA İLE EKLE</div>
                <label class="m3u-file-label">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Dosya seç (.m3u)
                    <input type="file" id="m3uFile" accept=".m3u,.m3u8" style="display:none;"/>
                </label>
                <div id="m3uStatus" class="m3u-status"></div>
            </div>
        </div>

        <div class="sidebar-header">Kanal Listesi</div>
        <div class="channel-list" id="channelGroups"></div>
    </div>
    <div class="player-area">
        <div class="player-card">
            <video id="videoPlayer" controls autoplay playsinline style="width:100%; height:100%;"></video>
        </div>
    </div>
</div>
<script>
function toggleKbHelp() {
    var panel = document.getElementById('kbHelpPanel');
    var overlay = document.getElementById('kbHelpOverlay');
    var isOpen = panel.style.display === 'block';
    panel.style.display = isOpen ? 'none' : 'block';
    overlay.style.display = isOpen ? 'none' : 'block';
}
</script>
<script src="app.js"></script>
<script>
    function toggleTheme() {
        const btn = document.getElementById('themeBtn');
        const isDay = document.body.classList.toggle('day');
        btn.classList.toggle('day', isDay);
        localStorage.setItem('tv-theme', isDay ? 'day' : 'night');
    }

    (function () {
        const saved = localStorage.getItem('tv-theme');
        const btn = document.getElementById('themeBtn');
        if (saved === 'day' && btn) {
            btn.classList.add('day');
        }
    })();

    const logoBtn = document.getElementById('logoToTop');
    const channelList = document.getElementById('channelGroups');
    if (logoBtn && channelList) {
        const scrollToTop = (e) => {
            e.preventDefault();
            channelList.scrollTo({ top: 0, behavior: 'smooth' });
            if (channelList.scrollTop !== 0) {
                channelList.scrollTop = 0;
            }
        };
        logoBtn.addEventListener('click', scrollToTop);
        logoBtn.addEventListener('touchstart', scrollToTop, { passive: false });
    }
</script>
</body>
</html>
