<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soner Akça | Web TV</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<script>
    if (localStorage.getItem('tv-theme') === 'day') {
        document.body.classList.add('day');
    }
</script>

<div class="topbar">
    <div class="logo" id="logoToTop" style="cursor: pointer; user-select: none;">
        Web<span>TV</span>
    </div>
    <div class="theme-toggle" id="themeBtn">🌙</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">Kanal Listesi</div>
        <div class="channel-list" id="channelGroups"></div>
    </div>

    <div class="player-area">
        <div class="player-card">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
    </div>
</div>

<script src="app.js"></script>

<script>
    // Mobilde ve Masaüstünde Kanal Listesini Başa Saran Fonksiyon
    const logoBtn = document.getElementById('logoToTop');
    const channelList = document.getElementById('channelGroups');

    if (logoBtn && channelList) {
        const scrollToTop = (e) => {
            e.preventDefault(); // Sayfanın genel kaymasını engeller
            
            // Doğrudan kanal listesi div'ini yukarı çeker
            channelList.scrollTo({
                top: 0,
                behavior: 'smooth'
            });

            // Mobil tarayıcılar için garanti: Eğer smooth çalışmazsa direkt başa sar
            if (channelList.scrollTop !== 0) {
                channelList.scrollTop = 0;
            }
        };

        // Hem tıklama hem de dokunma olaylarını dinliyoruz
        logoBtn.addEventListener('click', scrollToTop);
        logoBtn.addEventListener('touchstart', scrollToTop, { passive: false });
    }
</script>

</body>
</html>
