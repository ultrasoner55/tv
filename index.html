<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soner Akça | Web TV</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<script>
    if (localStorage.getItem('tv-theme') === 'day') {
        document.body.classList.add('day');
    }
</script>

<div class="topbar">
    <div class="logo" id="logoToTop" style="cursor: pointer;">Web<span>TV</span></div>
    <div class="theme-toggle" id="themeBtn">🌙</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">Kanal Listesi</div>
        <div class="channel-list" id="channelGroups"></div>
    </div>

    <div class="player-area">
        <div class="player-card">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
    </div>
</div>

<script src="app.js"></script>

<script>
    document.getElementById('logoToTop').addEventListener('click', function() {
        const channelList = document.getElementById('channelGroups');
        if (channelList) {
            channelList.scrollTo({
                top: 0,
                behavior: 'smooth' // Yumuşak kaydırma sağlar
            });
        }
    });
</script>

</body>
</html>
