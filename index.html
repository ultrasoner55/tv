<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soner Akça | Web TV</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        .fancy-toggle {
            width: 90px;
            height: 42px;
            border-radius: 21px;
            background: #1a1a2e;
            position: relative;
            cursor: pointer;
            transition: background 0.5s;
            overflow: hidden;
            border: 2px solid #2a2a4a;
            flex-shrink: 0;
        }
        .fancy-toggle.day { background: #87CEEB; border-color: #4A9EF5; }
        .f-star { position: absolute; background: white; border-radius: 50%; transition: opacity 0.4s; }
        .fancy-toggle.day .f-star { opacity: 0; }
        .f-cloud { position: absolute; opacity: 0; transition: opacity 0.4s; }
        .fancy-toggle.day .f-cloud { opacity: 1; }
        .fancy-knob {
            position: absolute;
            top: 3px; left: 3px;
            width: 32px; height: 32px;
            border-radius: 50%;
            transition: transform 0.45s cubic-bezier(.4,0,.2,1);
            z-index: 2;
            display: flex; align-items: center; justify-content: center;
        }
        .fancy-toggle.day .fancy-knob { transform: translateX(48px); }
        .sun-shape, .moon-shape {
            position: absolute; width: 32px; height: 32px;
            transition: opacity 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .fancy-toggle.day .moon-shape { opacity: 0; }
        .fancy-toggle:not(.day) .sun-shape { opacity: 0; }
    </style>
</head>
<body>
<script>
    if (localStorage.getItem('tv-theme') === 'day') {
        document.body.classList.add('day');
    }
</script>
<div class="topbar">
    <div class="logo" id="logoToTop" style="cursor: pointer; user-select: none;">
        Web<span>TV</span>
    </div>

    <!-- Gece/Gündüz Toggle -->
    <div class="fancy-toggle" id="themeBtn" onclick="toggleTheme()">
        <!-- Yıldızlar (gece) -->
        <div class="f-star" style="width:3px;height:3px;top:7px;left:55px;"></div>
        <div class="f-star" style="width:2px;height:2px;top:14px;left:70px;"></div>
        <div class="f-star" style="width:3px;height:3px;top:22px;left:58px;"></div>
        <div class="f-star" style="width:2px;height:2px;top:29px;left:72px;"></div>
        <div class="f-star" style="width:2px;height:2px;top:9px;left:80px;"></div>
        <!-- Bulutlar (gündüz) -->
        <svg class="f-cloud" style="top:5px;left:3px;width:18px;height:10px;" viewBox="0 0 18 10">
            <ellipse cx="9" cy="7.5" rx="7.5" ry="3.5" fill="white" opacity="0.9"/>
            <ellipse cx="6" cy="5.5" rx="4.5" ry="4" fill="white" opacity="0.9"/>
            <ellipse cx="13" cy="6" rx="3.5" ry="3" fill="white" opacity="0.9"/>
        </svg>
        <svg class="f-cloud" style="top:22px;left:20px;width:16px;height:9px;" viewBox="0 0 16 9">
            <ellipse cx="8" cy="7" rx="6.5" ry="3.5" fill="white" opacity="0.75"/>
            <ellipse cx="5" cy="5" rx="4" ry="3.5" fill="white" opacity="0.75"/>
            <ellipse cx="11" cy="5" rx="3.5" ry="2.5" fill="white" opacity="0.75"/>
        </svg>
        <svg class="f-cloud" style="top:10px;left:32px;width:13px;height:8px;" viewBox="0 0 13 8">
            <ellipse cx="6.5" cy="6" rx="5.5" ry="3" fill="white" opacity="0.6"/>
            <ellipse cx="4" cy="4" rx="3" ry="2.5" fill="white" opacity="0.6"/>
            <ellipse cx="9.5" cy="4" rx="2.5" ry="2" fill="white" opacity="0.6"/>
        </svg>
        <!-- Hareketli top -->
        <div class="fancy-knob">
            <div class="sun-shape">
                <svg width="32" height="32" viewBox="0 0 32 32">
                    <line x1="16" y1="2" x2="16" y2="6" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="16" y1="26" x2="16" y2="30" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="2" y1="16" x2="6" y2="16" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="26" y1="16" x2="30" y2="16" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="5.5" y1="5.5" x2="8.3" y2="8.3" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="23.7" y1="23.7" x2="26.5" y2="26.5" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="5.5" y1="26.5" x2="8.3" y2="23.7" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="23.7" y1="8.3" x2="26.5" y2="5.5" stroke="#f5c842" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="16" cy="16" r="7" fill="#f5c842"/>
                </svg>
            </div>
            <div class="moon-shape">
                <svg width="32" height="32" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="11" fill="#e8e8f0"/>
                    <circle cx="21" cy="12" r="10" fill="#1a1a2e"/>
                </svg>
            </div>
        </div>
    </div>
</div>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">Kanal Listesi</div>
        <div class="channel-list" id="channelGroups"></div>
    </div>
    <div class="player-area">
        <div class="player-card">
            <video id="videoPlayer" controls autoplay playsinline style="width:100%; height:100%;"></video>
        </div>
    </div>
</div>
<script src="app.js"></script>
<script>
    // Tema toggle fonksiyonu
    function toggleTheme() {
        const btn = document.getElementById('themeBtn');
        const isDay = document.body.classList.toggle('day');
        btn.classList.toggle('day', isDay);
        localStorage.setItem('tv-theme', isDay ? 'day' : 'night');
    }

    // Sayfa yüklenince kaydedilen temayı uygula
    (function () {
        const saved = localStorage.getItem('tv-theme');
        const btn = document.getElementById('themeBtn');
        if (saved === 'day') {
            btn.classList.add('day');
        }
    })();

    // Mobilde ve Masaüstünde Kanal Listesini Başa Saran Fonksiyon
    const logoBtn = document.getElementById('logoToTop');
    const channelList = document.getElementById('channelGroups');
    if (logoBtn && channelList) {
        const scrollToTop = (e) => {
            e.preventDefault();
            channelList.scrollTo({ top: 0, behavior: 'smooth' });
            if (channelList.scrollTop !== 0) {
                channelList.scrollTop = 0;
            }
        };
        logoBtn.addEventListener('click', scrollToTop);
        logoBtn.addEventListener('touchstart', scrollToTop, { passive: false });
    }
</script>
</body>
</html>
